<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BaanStory — Understand what you are seeing in Thailand</title>
  <meta name="description" content="Events, food markets, temple fairs and local traditions explained in plain language — what they are, why they matter, and what to notice when you go." />

  <!-- Fonts: IBM Plex Sans (display + Thai), Inter (body), IBM Plex Mono (caption). No serifs. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Responsive layout switches — design-spec breakpoint 768 */
    .desktop-nav { display: none !important; }
    @media (min-width: 768px) {
      .desktop-nav { display: inline-flex !important; }
      .hamburger { display: none !important; }
    }

    .event-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    @media (min-width: 600px)  { .event-grid { grid-template-columns: repeat(2, 1fr); gap: 24px; } }
    @media (min-width: 1024px) { .event-grid { grid-template-columns: repeat(3, 1fr); } }

    .points-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 768px) { .points-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }

    /* Home hero: 2-col on tablet+ with side example guide */
    @media (min-width: 900px) {
      .hero-grid { grid-template-columns: 1.15fr 0.85fr !important; gap: 56px !important; }
      .hero-side { display: block !important; }
      .mobile-example { display: none !important; }
    }

    /* Event detail layouts */
    @media (min-width: 900px) {
      .event-hero { grid-template-columns: 1fr 1fr !important; align-items: center; }
      .event-body { grid-template-columns: 1.5fr 1fr !important; gap: 64px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data first (plain JS, sets globals) -->
  <script src="data.js"></script>

  <!-- Tweaks panel (provides TweaksPanel + useTweaks + Tweak* controls) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Shared components, then pages, then app -->
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
